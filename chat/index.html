<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinRAG</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/assets/shell.css" />
    <style>
        :root {
            --bg-app:        #EAE7E0;
            --bg-sidebar:    #F2F0EC;
            --bg-panel:      #F2F0EC;
            --bg-hover:      #E6E3DC;
            --bg-gray-layer: #E6E3DC;
            --bg-sources:    #F2F0EC;
            --border:        #D4D0C8;
            --border-subtle: #DED9D0;
            --accent:        #2C2A24;
            --accent-light:  #E6E3DC;
            --accent-muted:  #A09890;
            --accent-dark:   #1C1A16;
            --text-primary:  #1C1A16;
            --text-secondary:#4A4640;
            --text-muted:    #A09890;
            --success:       #5C7A58;
            --success-light: #D6E3D4;
            --warning:       #8A7230;
            --warning-light: #F0E8D4;
            --danger:        #8C4040;
            --danger-light:  #F0E2E2;
            --shadow-sm:     none;
            --shadow-md:     none;
            --r-sm: 6px;
            --r-md: 10px;
            --r-lg: 14px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; box-shadow: none !important; }
        body {
            font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
            font-weight: 400;
            color: var(--text-primary);
            background-color: var(--bg-app);
            height: 100vh;
            display: flex;
            overflow: hidden;
            font-size: 14px;
        }
        button, input, textarea, select { font-family: inherit; font-size: inherit; outline: none; border: none; background: none; }
        button { cursor: pointer; color: inherit; }
        .font-mono { font-family: "JetBrains Mono", Consolas, monospace; }
        .fw-500 { font-weight: 500; }
        .card { background: var(--bg-panel); border: 0.5px solid var(--border); border-radius: var(--r-lg); box-shadow: var(--shadow-sm); }
        .text-muted { color: var(--text-muted); }

        /* Layout */
        .sidebar {
            width: 220px;
            background: #E2DED6;
            border-radius: 12px;
            margin: 10px 0 10px 10px;
            border: none;
            border-right: none;
            box-shadow: none;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 10;
        }
        .page-body,
        .chat-main,
        .main-content {
            background: #EAE7E0;
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            min-width: 0;
        }
        .right-panel {
            width: 240px;
            background: var(--bg-panel);
            border: 0.5px solid var(--border);
            border-radius: 12px;
            margin: 10px 10px 10px 0;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .right-panel.collapsed { display: none; }

        /* Sidebar */
        .sidebar-header { padding: 20px 16px 16px; display: flex; flex-direction: column; gap: 12px; border-bottom: 0.5px solid var(--border-subtle); }
        .sidebar-top { display: flex; align-items: center; justify-content: space-between; }
        .sys-title { font-size: 13px; font-weight: 500; color: var(--text-primary); }
        .admin-link {
            font-size: 11px;
            color: var(--text-muted);
            text-decoration: none;
            padding: 0;
            border: none;
            background: none;
            transition: color 0.15s;
        }
        .admin-link:hover { color: var(--accent); background: none; }
        .btn-new-chat {
            background: #2C2A24;
            color: #F2F0EC;
            padding: 9px 12px;
            border-radius: var(--r-md);
            text-align: center;
            font-size: 12px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .btn-new-chat:hover { background: #1C1A16; }

        .session-list { flex: 1; overflow-y: auto; padding: 12px 0; display: flex; flex-direction: column; gap: 16px; }
        .session-group { display: flex; flex-direction: column; gap: 4px; }
        .group-title { padding: 0 16px; font-size: 12px; color: var(--text-muted); font-weight: 500; }
        .session-item { padding: 10px 16px; margin: 0 8px; border-radius: var(--r-sm); cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-left: 2px solid transparent; }
        .session-item:hover { background: var(--bg-hover); }
        .session-item.active { background: var(--bg-hover); border-left-color: var(--accent); }
        .session-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; margin-right: 8px; }
        .session-time { font-size: 12px; color: var(--text-muted); }
        .session-main { display: flex; align-items: center; min-width: 0; flex: 1; }
        .session-actions { display: inline-flex; align-items: center; gap: 6px; margin-left: 8px; }
        .session-delete {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            opacity: 0;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .session-item:hover .session-delete { opacity: 0; }
        .session-item.active .session-delete { opacity: 1; }
        .session-delete:hover { background: var(--danger-light); color: var(--danger); }

        .user-profile { padding: 16px; border-top: 0.5px solid var(--border-subtle); display: flex; align-items: center; gap: 12px; }
        .avatar { width: 32px; height: 32px; background: var(--accent-muted); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--bg-panel); font-weight: 500; }

        /* Main Content */
        .status-strip { padding:10px 20px; display:flex; align-items:center; gap:8px; border-bottom: 0.5px solid var(--border-subtle); }
        #empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            --accent: #8B4513;
            --accent-muted: #B8784A;
            --text-primary: #2C2A24;
            --text-muted: #9A9287;
        }
        .empty-title { font-size: 24px; font-weight: 500; color: var(--text-secondary); margin-bottom: 32px; }
        .hero-kicker {
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: .1em;
            margin-bottom: 12px;
            text-align: center;
        }
        .hero-title {
            font-size: 32px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.35;
            text-align: center;
        }
        .hero-accent {
            color: var(--accent);
        }
        .hero-features {
            display: flex;
            gap: 24px;
            justify-content: center;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .hero-feature {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-muted);
        }
        .hero-feature svg {
            color: var(--accent-muted);
            flex-shrink: 0;
        }
        .hero-example-title {
            font-size: 10px;
            color: #B8B0A8;
            letter-spacing: .06em;
            text-align: center;
            margin-bottom: 12px;
        }
        .suggestion-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; max-width: 900px; width: 100%; }
        @media (max-width: 1024px) {
            .suggestion-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 640px) {
            .suggestion-grid { grid-template-columns: 1fr; }
        }
        .suggestion-card {
            padding: 12px 14px;
            background: var(--bg-panel);
            border-radius: 10px;
            border: none;
            box-shadow: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 0;
            transition: background 0.15s;
        }
        .suggestion-card:hover { background: var(--bg-hover); }
        .example-tag {
            font-size: 11px;
            font-weight: 500;
            color: var(--accent);
            margin-bottom: 6px;
        }
        .example-question {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 6px;
            line-height: 1.4;
        }
        .example-sub {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        #chat-container { flex: 1; overflow-y: auto; padding: 24px; display: none; flex-direction: column; gap: 24px; }

        .message-row { display: flex; width: 100%; }
        .message-row.user { justify-content: flex-end; }

        .bubble { max-width: 70%; padding: 12px 16px; line-height: 1.5; word-break: break-word; }
        .bubble-user { background: #2C2A24; color: #F2F0EC; border-radius: var(--r-lg) var(--r-lg) 4px var(--r-lg); }
        .bubble-ai { background: var(--bg-panel); color: var(--text-primary); border: 0.5px solid var(--border); box-shadow: var(--shadow-sm); border-radius: 4px var(--r-lg) var(--r-lg) var(--r-lg); }

        .ai-footer { margin-top: 8px; padding-top: 8px; border-top: 0.5px solid var(--border-subtle); display: flex; flex-wrap: wrap; gap: 8px; align-items: center; font-size: 12px; }
        .badge { padding: 2px 6px; border-radius: var(--r-sm); background: var(--bg-gray-layer); color: var(--text-secondary); display: inline-flex; align-items: center; }
        .btn-feedback { padding: 2px 4px; border-radius: var(--r-sm); cursor: pointer; transition: background 0.2s; }
        .btn-feedback:hover { background: var(--bg-hover); }
        .btn-sources-toggle { color: var(--accent); font-weight: 500; cursor: pointer; user-select: none; }

        .sources-area { display: none; margin-top: 12px; gap: 8px; flex-direction: column; }
        .sources-area.open { display: flex; }
        .source-card { background: var(--bg-sources); border: 0.5px solid var(--border); border-radius: var(--r-md); padding: 10px 12px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .source-card:hover { filter: brightness(0.97); }
        .source-icon { width: 24px; height: 24px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--bg-panel); font-weight: 500; }
        .source-icon.pdf { background: var(--danger); }
        .source-icon.url { background: var(--accent-dark); }
        .source-info { flex: 1; overflow: hidden; }
        .source-title { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 13px; }
        .source-domain { font-size: 11px; color: var(--text-muted); }
        .source-score { color: var(--success); font-size: 12px; }

        .clarify-grid { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
        .clarify-option { background: var(--bg-app); border: 0.5px solid var(--border); border-radius: var(--r-sm); padding: 10px; cursor: pointer; font-size: 13px; }
        .clarify-option:hover { background: var(--accent-light); border-color: var(--accent); }

        .cursor { display: inline-block; width: 6px; height: 14px; background: var(--accent); vertical-align: middle; animation: blink 1s step-end infinite; margin-left: 4px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Input Area */
        .input-wrapper { padding: 0 24px 24px; }
        .input-box { background: var(--bg-panel); border: 0.5px solid var(--border); border-radius: var(--r-lg); display: flex; flex-direction: column; padding: 12px 16px; transition: border-color 0.2s; }
        .input-box:focus-within { border-color: var(--accent-muted); }
        .input-row { display: flex; gap: 12px; align-items: flex-end; }
        .btn-attach {
            width: 28px;
            height: 28px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: var(--text-muted);
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-attach:hover { background: var(--bg-hover); color: var(--text-primary); }
        .btn-attach.has-image { color: var(--accent); }
        .img-preview-strip {
            display: flex;
            gap: 8px;
            padding: 0 2px 10px;
            flex-wrap: wrap;
        }
        .img-thumb {
            width: 52px;
            height: 52px;
            border-radius: 8px;
            border: 0.5px solid var(--border);
            position: relative;
            overflow: visible;
            flex-shrink: 0;
            cursor: pointer;
        }
        .img-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            display: block;
        }
        .img-thumb-remove {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--danger);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            flex-shrink: 0;
        }
        .img-thumb-remove svg { width: 8px; height: 8px; }
        .bubble-img img {
            max-width: 220px;
            max-height: 160px;
            border-radius: 10px 10px 2px 10px;
            display: block;
            border: 0.5px solid var(--border);
        }
        textarea { flex: 1; resize: none; max-height: 120px; min-height: 20px; line-height: 20px; color: var(--text-primary); }
        textarea::placeholder { color: var(--text-muted); }
        .btn-send {
            background: #2C2A24;
            color: #F2F0EC;
            width: 32px;
            height: 32px;
            border-radius: var(--r-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .btn-send:hover { background: #1C1A16; }
        .btn-send:disabled { background: var(--bg-gray-layer); color: var(--text-muted); cursor: not-allowed; }

        /* Right Panel */
        .right-header { padding: 16px; font-weight: 500; border-bottom: 0.5px solid var(--border-subtle); display: flex; justify-content: space-between; }
        .btn-close-panel { color: var(--text-muted); cursor: pointer; }
        .right-content { padding: 16px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 12px; }

        /* Toast */
        .toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
        .toast { background: var(--bg-panel); border: 0.5px solid var(--danger); color: var(--danger); padding: 10px 16px; border-radius: var(--r-md); box-shadow: var(--shadow-md); font-size: 13px; opacity: 0; animation: fade-in-out 3s ease forwards; }
        @keyframes fade-in-out { 0% { opacity: 0; transform: translateY(-10px); } 10% { opacity: 1; transform: translateY(0); } 90% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-10px); } }
    </style>
</head>

                    chat: '闲聊',
                }[meta.intent] || (meta.intent && meta.intent !== '-' ? meta.intent : '通用问答');
                const routeKey = String(meta.route || '').trim();
                const routeLabel = STRATEGY_LABEL_MAP[routeKey] || routeKey || '-';
                const isVision = Boolean(meta.is_vision);
                const footer = document.createElement('div');
                footer.className = 'ai-footer';
                if (isVision) {
                    footer.innerHTML = `
                        <span style="font-size:10px;padding:2px 6px;background:var(--accent-light);color:var(--accent-dark);border-radius:4px;">Vision</span>
                        <span style="font-size:10px;color:var(--text-muted);">Qwen3-VL · ${meta.latency_ms}ms</span>
                        <span style="font-size:10px; color:var(--text-muted);">·</span>
                        <span style="font-size:10px; color:var(--text-muted);">策略: ${routeLabel}</span>
                        <span class="btn-feedback" onclick="UIController.handleFeedback('${msgId}', 'up')">有帮助</span>
                        <span class="btn-feedback" onclick="UIController.handleFeedback('${msgId}', 'down')">不准确</span>
                    `;
                } else {
                    footer.innerHTML = `
                        <span style="font-size:10px; color:var(--text-muted);">意图: ${intentLabel}</span>
                        <span style="font-size:10px; color:var(--text-muted);">·</span>
                        <span style="font-size:10px; color:var(--text-muted);">策略: ${routeLabel}</span>
                        <span class="text-muted font-mono" style="margin-left:auto; font-size:10px;">${meta.latency_ms}ms</span>
                        <span class="btn-feedback" onclick="UIController.handleFeedback('${msgId}', 'up')">有帮助</span>
                        <span class="btn-feedback" onclick="UIController.handleFeedback('${msgId}', 'down')">不准确</span>
                    `;
                }
                bubble.appendChild(footer);
                this.scrollToBottom();
            },
            setAISources(msgId, sources) {
                const msgNode = document.getElementById(msgId);
                if (!msgNode) return;
                const bubble = msgNode.querySelector('.bubble-ai');
                const footer = bubble.querySelector('.ai-footer');
                if (footer && sources.chunks && sources.chunks.length > 0) {
                    const toggleBtn = document.createElement('span');
                    toggleBtn.className = 'btn-sources-toggle';
                    toggleBtn.innerText = `[引用 ${sources.chunks.length} 个来源]`;
                    footer.insertBefore(toggleBtn, footer.querySelector('.font-mono'));
                    const sourceArea = document.createElement('div');
                    sourceArea.className = 'sources-area';
                    sources.chunks.forEach(src => {
                        const card = document.createElement('div');
                        card.className = 'source-card';
                        card.onclick = () => UIController.openRightPanel(src);
                        card.innerHTML = `
                            <div class="source-icon ${src.type.toLowerCase()}">${src.type}</div>
                            <div class="source-info">
                                <div class="source-title">${src.title}</div>
                                <div class="source-domain" style="margin-top:2px;">
                                    ${src.domain}
                                    <span style="margin-left:8px; color:var(--success);" class="font-mono">相关度 ${src.score}</span>
                                </div>
                            </div>
                        `;
                        sourceArea.appendChild(card);
                    });
                    bubble.appendChild(sourceArea);
                    toggleBtn.onclick = () => { sourceArea.classList.toggle('open'); this.scrollToBottom(); };
                }
            },
            showClarification(msgId, options) {
                const msgNode = document.getElementById(msgId);
                if (!msgNode) return;
                const bubble = msgNode.querySelector('.bubble-ai');
                const grid = document.createElement('div');
                grid.className = 'clarify-grid';
                options.forEach(opt => {
                    const btn = document.createElement('div');
                    btn.className = 'clarify-option card';
                    btn.innerText = opt;
                    btn.onclick = () => { grid.style.opacity = '0.5'; grid.style.pointerEvents = 'none'; UIController.sendQuestion(opt); };
                    grid.appendChild(btn);
                });
                bubble.appendChild(grid);
                this.scrollToBottom();
            },
            scrollToBottom() { this.container.scrollTop = this.container.scrollHeight; },
            escapeHTML(str) {
                return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag]));
            }
        };

        const StreamHandler = {
            isStreaming: false,
            async startStream(question, domain, sessionId, imageBase64 = null) {
                if (this.isStreaming) return;
                this.isStreaming = true;
                UIController.setSendButtonState(false);
                const streamFallbackMessage = '服务中断，请重试。';
                const msgId = MessageRenderer.createAIMessageNode();
                const streamStartMs = Date.now();
                let finalLatencyMs = 0;
                let latestDecision = null;
                let finished = false;
                let eventSource = null;
                const hasRenderedText = () => {
                    const msgNode = document.getElementById(msgId);
                    if (!msgNode) return false;
                    const contentNode = msgNode.querySelector('.ai-content');
                    if (!contentNode) return false;
                    const raw = String(contentNode.dataset.raw || '').trim();
                    if (raw) return true;
                    const plain = String(contentNode.textContent || '').replace(/\s+/g, '').trim();
                    return plain.length > 0;
                };
                const tryRecoverFromHistory = async () => {
                    if (!sessionId) return false;
                    try {
                        const messages = await Api.getMessages(sessionId);
                        if (!Array.isArray(messages) || messages.length < 2) return false;
                        const last = messages[messages.length - 1];
                        const prev = messages[messages.length - 2];
                        const isCurrentQuestion = prev && prev.role === 'user' && prev.content === question;
                        if (isCurrentQuestion && last && last.role === 'assistant' && last.content) {
                            MessageRenderer.updateAIToken(msgId, String(last.content));
                            return true;
                        }
                    } catch (_) {}
                    return false;
                };
                const ensureFallbackVisible = async () => {
                    const recovered = await tryRecoverFromHistory();
                    if (!recovered && !hasRenderedText()) {
                        MessageRenderer.updateAIToken(msgId, streamFallbackMessage);
                    }
                };
                const renderMetaIfReady = () => {
                    if (!latestDecision) return;
                    const intentObj = latestDecision.intent || {};
                    const intent = intentObj.intent_label || intentObj.intent_type || '-';
                    const elapsedMs = Date.now() - streamStartMs;
                    const strategy = String(latestDecision.strategy || '-');
                    MessageRenderer.setAIMeta(msgId, {
                        intent: String(intent),
                        route: strategy,
                        latency_ms: Number(finalLatencyMs || elapsedMs || 0),
                        is_vision: strategy === 'vision_only' || strategy === 'vision_kb',
                    });
                };
                const finish = () => {
                    if (finished) return;
                    finished = true;
                    MessageRenderer.setAIFinished(msgId);
                    this.isStreaming = false;
                    UIController.setSendButtonState(true);
                    Api.getSessions()
                        .then(rows => {
                            SessionManager.sessions = rows;
                            SessionManager.renderList();
                        })
                        .catch(() => {});
                };
                try {
                    const decisionPromise = Api.getDecision(question).catch(() => null);
                    eventSource = Api.startChatSSE(question, sessionId, imageBase64);

                    eventSource.onmessage = (evt) => {
                        let payload = {};
                        try {
                            payload = JSON.parse(evt.data || '{}');
                        } catch (_) {}
                        const chunk = typeof payload.chunk === 'string' ? payload.chunk : '';
                        if (chunk) MessageRenderer.updateAIToken(msgId, chunk);
                        if (payload.done === true) {
                            finalLatencyMs = Number(payload.total_latency_ms || payload.latency_ms || 0);
                            renderMetaIfReady();
                            eventSource.close();
                            finish();
                        }
                    };
                    eventSource.onerror = async () => {
                        if (finished) return;
                        eventSource.close();
                        await ensureFallbackVisible();
                        renderMetaIfReady();
                        showToast("网络请求失败或流式中断，请检查网络连接后重试");
                        finish();
                    };

                    const decision = await decisionPromise;
                    if (decision) {
                        latestDecision = decision;
                        renderMetaIfReady();
                        if (decision.strategy === 'clarify' && Array.isArray(decision.candidates) && decision.candidates.length) {
                            MessageRenderer.showClarification(msgId, decision.candidates);
                        }
                    }
                } catch (e) {
                    showToast(`网络请求失败: ${e.message || '未知错误'}`);
                    if (eventSource) eventSource.close();
                    await ensureFallbackVisible();
                    renderMetaIfReady();
                    finish();
                }
            }
        };

        const UIController = {
            inputEl: document.getElementById('chat-input'),
            sendBtn: document.getElementById('btn-send'),
            statusStripText: document.getElementById('status-strip-text'),
            statusStripDot: document.getElementById('status-strip-dot'),
            rightPanel: document.getElementById('right-panel'),
            pendingImage: null,
            async init() {
                await SessionManager.init();
                this.bindEvents();
                await this.loadRuntimeStatus();
                await this.loadSamples();
            },
            async loadRuntimeStatus() {
                const [healthResult] = await Promise.allSettled([Api.getHealth()]);
                const health = healthResult.status === 'fulfilled' ? healthResult.value : null;
                const serviceOk = Boolean(health && health.status === 'ok');

                if (this.statusStripText) {
                    const serviceText = serviceOk ? '服务正常' : '服务异常';
                    this.statusStripText.textContent = `${serviceText} · 47 份行研报告 · 5 个行业`;
                }
                if (this.statusStripDot) {
                    this.statusStripDot.style.background = serviceOk ? 'var(--accent-muted)' : 'var(--danger)';
                }
            },
            bindEvents() {
                document.getElementById('btn-new-chat').onclick = () => { SessionManager.createNewSession(); };
                this.inputEl.addEventListener('input', () => {
                    this.inputEl.style.height = 'auto';
                    this.inputEl.style.height = Math.min(this.inputEl.scrollHeight, 120) + 'px';
                });
                this.inputEl.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.handleSend(); }
                });
                this.sendBtn.onclick = () => this.handleSend();
                document.getElementById('btn-close-panel').onclick = () => this.rightPanel.classList.add('collapsed');
                this.initImageUpload();
            },
            initImageUpload() {
                const attachBtn = document.getElementById('btn-attach');
                const fileInput = document.getElementById('img-file-input');
                const inputBox = document.querySelector('.input-box');
                if (!attachBtn || !fileInput || !inputBox) return;

                attachBtn.onclick = () => fileInput.click();
                fileInput.addEventListener('change', (e) => {
                    const target = e.target;
                    const file = target && target.files ? target.files[0] : null;
                    if (file) this.handleImageFile(file);
                    fileInput.value = '';
                });

                document.addEventListener('paste', (e) => {
                    if (!e.clipboardData) return;
                    const items = Array.from(e.clipboardData.items || []);
                    const imgItem = items.find(item => item.type.startsWith('image/'));
                    if (!imgItem) return;
                    const file = imgItem.getAsFile();
                    if (file) this.handleImageFile(file);
                });

                inputBox.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    inputBox.style.borderColor = 'var(--accent-muted)';
                });
                inputBox.addEventListener('dragleave', () => {
                    inputBox.style.borderColor = '';
                });
                inputBox.addEventListener('drop', (e) => {
                    e.preventDefault();
                    inputBox.style.borderColor = '';
                    const file = e.dataTransfer && e.dataTransfer.files ? e.dataTransfer.files[0] : null;
                    if (file && file.type.startsWith('image/')) this.handleImageFile(file);
                });
            },
            handleImageFile(file) {
                if (file.size > 10 * 1024 * 1024) {
                    const sizeMB = (file.size / (1024 * 1024)).toFixed(1);
                    showToast(`图片大小为 ${sizeMB}MB，超过10MB限制`);
                    return;
                }
                const reader = new FileReader();
                reader.onload = (e) => {
                    const target = e.target;
                    const dataUrl = target && typeof target.result === 'string' ? target.result : '';
                    if (!dataUrl) return;
                    this.pendingImage = { dataUrl, file };
                    this.renderImagePreview(dataUrl);
                };
                reader.readAsDataURL(file);
            },
            renderImagePreview(dataUrl) {
                const strip = document.getElementById('img-preview-strip');
                const hint = document.getElementById('img-hint');
                const attachBtn = document.getElementById('btn-attach');
                if (!strip || !hint || !attachBtn) return;
                strip.innerHTML = `
                    <div class="img-thumb">
                        <img src="${dataUrl}" alt="预览">
                        <button class="img-thumb-remove" id="img-remove-btn">
                            <svg viewBox="0 0 8 8" fill="none">
                                <path d="M1.5 1.5L6.5 6.5M6.5 1.5L1.5 6.5" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
                            </svg>
                        </button>
                    </div>
                `;
                strip.style.display = 'flex';
                hint.style.display = 'block';
                attachBtn.classList.add('has-image');
                const removeBtn = document.getElementById('img-remove-btn');
                if (removeBtn) removeBtn.onclick = () => this.clearImage();
            },
            clearImage() {
                this.pendingImage = null;
                const strip = document.getElementById('img-preview-strip');
                const hint = document.getElementById('img-hint');
                const attachBtn = document.getElementById('btn-attach');
                if (strip) {
                    strip.style.display = 'none';
                    strip.innerHTML = '';
                }
                if (hint) hint.style.display = 'none';
                if (attachBtn) attachBtn.classList.remove('has-image');
            },
            async loadSamples() {
                try {
                    const grid = document.getElementById('suggestion-grid');
                    grid.innerHTML = '';
                    EXAMPLE_QUESTIONS.forEach((item) => {
                        const card = document.createElement('div');
                        card.className = 'suggestion-card';
                        card.innerHTML = `
                            <div class="example-tag">${item.tag}</div>
                            <div class="example-question">${item.question}</div>
                            <div class="example-sub">${item.sub}</div>
                        `;
                        card.onclick = () => this.sendQuestion(item.question);
                        grid.appendChild(card);
                    });
                } catch (e) {}
            },
            switchToChatState() {
                document.getElementById('empty-state').style.display = 'none';
                document.getElementById('chat-container').style.display = 'flex';
            },
            switchToEmptyState() {
                document.getElementById('chat-container').style.display = 'none';
                document.getElementById('empty-state').style.display = 'flex';
                document.getElementById('chat-container').innerHTML = '';
                this.rightPanel.classList.add('collapsed');
            },
            async handleSend() {
                // Demo 模式：提示用户暂不支持对话
                showToast('Demo 暂不支持回复', 'info');
            },
            async sendQuestion(text) {
                if (!SessionManager.currentSessionId) {
                    await SessionManager.createNewSession(false);
                }
                const sessionId = SessionManager.currentSessionId;
                this.switchToChatState();
                const imageDataUrl = this.pendingImage ? this.pendingImage.dataUrl : null;
                const imageBase64 = imageDataUrl && imageDataUrl.includes(',')
                    ? imageDataUrl.split(',')[1]
                    : imageDataUrl;
                const normalizedText = text || (imageDataUrl ? '请帮我分析这张图片' : text);
                if (imageDataUrl) MessageRenderer.appendUserWithImage(normalizedText, imageDataUrl);
                else MessageRenderer.appendUser(normalizedText);
                if (this.pendingImage) this.clearImage();
                await SessionManager.upsertFromQuestion(normalizedText);
                StreamHandler.startStream(normalizedText, 'general', sessionId, imageBase64);
            },
            setSendButtonState(enabled) { this.sendBtn.disabled = !enabled; },
            openRightPanel(source) {
                this.rightPanel.classList.remove('collapsed');
                const content = document.getElementById('right-content');
                // 清空右面板内容
                content.innerHTML = '';
                const detail = document.createElement('div');
                detail.className = 'card';
                detail.style.padding = '12px';
                detail.innerHTML = `
                    <div style="font-weight: 500; margin-bottom: 8px;">${source.title}</div>
                    <div class="text-muted" style="font-size: 12px; margin-bottom: 8px;">来源: ${source.domain}</div>
                    <div class="font-mono text-muted" style="font-size: 11px;">相关度得分: ${source.score}</div>
                    <hr style="border: 0; border-top: 0.5px solid var(--border-subtle); margin: 8px 0;"/>
                    <div style="font-size: 13px; color: var(--text-secondary); line-height: 1.5;">此处为知识源分块（Chunk）的具体上下文内容展示区域，包含匹配到的文本段落...</div>
                `;
                content.prepend(detail);
            },
            async handleFeedback(msgId, type) {
                try { await Api.submitFeedback(msgId, type); showToast(type === 'up' ? '感谢您的正面反馈' : '已记录您的问题反馈'); }
                catch(e) {}
            }
        };

        document.addEventListener('DOMContentLoaded', () => UIController.init());
    </script>
</body>
</html>
